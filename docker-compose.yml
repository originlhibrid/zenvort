services:
  redis:
    image: redis:7-alpine
    container_name: zenvort-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: zenvort-gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-routes=true
      - --libreoffice-restart-after=10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: .
    container_name: zenvort-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    volumes:
      - zenvort_data:/data
      - zenvort_tmp:/tmp/zenvort
    env_file: .env
    environment:
      - DB_PATH=/data/zenvort.db
      - TEMP_DIR=/tmp/zenvort
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    container_name: zenvort-worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q celery
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    volumes:
      - zenvort_data:/data
      - zenvort_tmp:/tmp/zenvort
    env_file: .env
    environment:
      - DB_PATH=/data/zenvort.db
      - TEMP_DIR=/tmp/zenvort
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3

volumes:
  redis_data:
  zenvort_data:
  zenvort_tmp:
