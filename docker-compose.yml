version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zenvort-postgres
    environment:
      POSTGRES_DB: zenvort
      POSTGRES_USER: zenvort
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenvort -d zenvort"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zenvort-redis
    ports:
      - "6379:6379"

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: zenvort-gotenberg
    restart: unless-stopped
    expose:
      - "3002"
    volumes:
      - gotenberg_tmp:/tmp/gotenberg
    command:
      - "gotenberg"
      - "--chromium-disable-routes=true"
      - "--libreoffice-restart-after=10"
      - "--api-timeout=60s"

  api:
    container_name: zenvort-api
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

  worker:
    container_name: zenvort-worker
    build:
      context: .
      dockerfile: worker/Dockerfile
    expose:
      - "3001"
    depends_on:
      - postgres
      - redis
      - gotenberg
      - api
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - gotenberg_tmp:/tmp/gotenberg

  migrate:
    container_name: zenvort-migrate
    build:
      context: .
      dockerfile: api/Dockerfile
    working_dir: /app
    command: ["alembic", "--config", "/app/db/alembic.ini", "upgrade", "head"]
    volumes:
      - ./db:/app/db
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  gotenberg_tmp:
