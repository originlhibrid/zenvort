services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zenvort
      POSTGRES_USER: zenvort
      POSTGRES_PASSWORD: zenvort
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenvort -d zenvort"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    command: node apps/api/dist/index.js

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    expose:
      - "3001"   # Metrics + health (internal only — not published to host)
    depends_on:
      - postgres
      - redis
      - api
    env_file:
      - .env
    restart: unless-stopped
    command: node apps/worker/dist/index.js

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: sh -c "npx prisma migrate deploy --schema=./packages/db/prisma/schema.prisma"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: node packages/db/seed.cjs
    env_file:
      - .env
    depends_on:
      - migrate
    restart: "no"

volumes:
  postgres_data: