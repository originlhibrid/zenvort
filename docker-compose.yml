services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zenvort
      POSTGRES_USER: zenvort
      POSTGRES_PASSWORD: zenvort
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    command: node apps/api/dist/index.js

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      - postgres
      - redis
      - api
    env_file:
      - .env
    command: node apps/worker/dist/index.js

volumes:
  postgres_data: